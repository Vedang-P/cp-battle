# Web VM stack — Next.js + workers + Postgres + Redis + Nginx.
# All app containers use the same image; workers override `command`.
#
# Usage (on the web VM, from the repo root):
#   docker compose --env-file .env.production -f deploy/docker-compose.web.yml up -d
#
# mem_limit on every service: the VM is e2-medium (4GB) running 8 containers,
# so a single runaway (e.g. a judge fan-out or a leak) must not OOM the whole
# box. A container that hits its limit is OOM-killed and restarted in isolation.
# Budget (~3GB, leaving headroom for the OS): pg 512 + redis 256 + web 1024 +
# realtime 384 + 3 workers 256 each + nginx 64.

name: zapdos-web

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: zapdos-web:latest
    restart: unless-stopped
    mem_limit: 1024m
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REALTIME_URL: http://realtime:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose: ["3000"]

  realtime:
    image: zapdos-web:latest
    restart: unless-stopped
    mem_limit: 384m
    command: ["./apps/web/node_modules/.bin/tsx", "apps/web/server/index.ts"]
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REALTIME_PORT: "3002"
    depends_on:
      redis:
        condition: service_healthy
    expose: ["3002"]

  matchmaker:
    image: zapdos-web:latest
    restart: unless-stopped
    mem_limit: 256m
    command: ["./apps/web/node_modules/.bin/tsx", "apps/web/server/matchmaker.ts"]
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REALTIME_URL: http://realtime:3002
    depends_on:
      redis:
        condition: service_healthy

  finalizer:
    image: zapdos-web:latest
    restart: unless-stopped
    mem_limit: 256m
    command: ["./apps/web/node_modules/.bin/tsx", "apps/web/server/finalizer.ts"]
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REALTIME_URL: http://realtime:3002
    depends_on:
      redis:
        condition: service_healthy

  bot:
    image: zapdos-web:latest
    restart: unless-stopped
    mem_limit: 256m
    command: ["./apps/web/node_modules/.bin/tsx", "apps/web/server/bot-worker.ts"]
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REALTIME_URL: http://realtime:3002
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - realtime

volumes:
  postgres-data:
  redis-data:
