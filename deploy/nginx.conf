# Nginx reverse proxy for Zapdos.
# Routes /socket.io/ → realtime:3002, everything else → web:3000.
# When a domain is added later, add ssl + 443 listen here.
#
# IMPORTANT: We use Docker's embedded DNS resolver (127.0.0.11) with variable
# upstreams instead of static `upstream {}` blocks. Static upstreams are
# resolved once at nginx startup and cached forever, so when a container is
# recreated (e.g. `docker compose up --force-recreate web` assigns it a new IP)
# nginx keeps proxying to the dead old IP and returns 502 on every request
# until nginx itself is restarted. The resolver + `set $var` form re-resolves
# the name at request time (cached for `valid`), so deploys no longer 502.

server {
    listen 80;
    server_name _;

    client_max_body_size 256k;

    # Docker embedded DNS. valid=10s → picks up a recreated container's new IP
    # within 10 seconds. ipv6=off avoids slow/failing AAAA lookups in Docker.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Socket.IO — must be before / to match the longer path
    location /socket.io/ {
        set $realtime_upstream realtime:3002;
        proxy_pass http://$realtime_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Next.js
    location / {
        set $web_upstream web:3000;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
