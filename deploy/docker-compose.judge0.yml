# Judge0 VM stack — Judge0 server + worker + its own Postgres + Redis.
# Judge0 needs privileged mode for the isolate sandbox (cgroups).
#
# Usage (on the Judge0 VM, from the repo root):
#   docker compose --env-file .env.judge0 -f deploy/docker-compose.judge0.yml up -d

name: zapdos-judge0

services:
  judge0-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judge0-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  judge0-server:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    ports:
      - "2358:2358"
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
      - ./isolate.cfg:/usr/local/etc/isolate:ro
      # Precompiled <bits/stdc++.h> (built once on the host via
      # /opt/judge0-pch/build.sh). Cuts each C++ -O2 compile from ~1.6s to
      # ~0.4s, which is the dominant cost when many users submit at once.
      # GCC silently ignores it if compile flags ever differ, so it's safe.
      - /opt/judge0-pch/stdc++.h.gch:/usr/local/gcc-9.2.0/include/c++/9.2.0/x86_64-pc-linux-gnu/bits/stdc++.h.gch:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"
      MAX_MEMORY_LIMIT: "512000"
      MEMORY_LIMIT: "256000"
      # Accept the generous CPU/wall limits the judge client sends. The
      # compile-once batch run executes every test case in one sandbox, so the
      # box-level limit must cover the whole run (per-case limits are enforced
      # inside the harness). MAX_MAX_FILE_SIZE is raised so large compiled
      # binaries and big test inputs/outputs aren't truncated.
      MAX_CPU_TIME_LIMIT: "40"
      MAX_EXTRA_CPU_TIME: "5"
      MAX_WALL_TIME_LIMIT: "60"
      MAX_MAX_FILE_SIZE: "65536"
      # Resque workers per container. 3 containers x 2 = 6 total, matched to the
      # 2-vCPU box: enough to overlap compiles with I/O without the 6x CPU
      # oversubscription (12 workers) that caused isolate internal errors.
      COUNT: "2"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/curl -sf http://localhost:2358/languages >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  judge0-worker:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    command: ["./scripts/workers"]
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
      - ./isolate.cfg:/usr/local/etc/isolate:ro
      # Precompiled <bits/stdc++.h> (built once on the host via
      # /opt/judge0-pch/build.sh). Cuts each C++ -O2 compile from ~1.6s to
      # ~0.4s, which is the dominant cost when many users submit at once.
      # GCC silently ignores it if compile flags ever differ, so it's safe.
      - /opt/judge0-pch/stdc++.h.gch:/usr/local/gcc-9.2.0/include/c++/9.2.0/x86_64-pc-linux-gnu/bits/stdc++.h.gch:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"
      MAX_MEMORY_LIMIT: "512000"
      MEMORY_LIMIT: "256000"
      # Accept the generous CPU/wall limits the judge client sends. The
      # compile-once batch run executes every test case in one sandbox, so the
      # box-level limit must cover the whole run (per-case limits are enforced
      # inside the harness). MAX_MAX_FILE_SIZE is raised so large compiled
      # binaries and big test inputs/outputs aren't truncated.
      MAX_CPU_TIME_LIMIT: "40"
      MAX_EXTRA_CPU_TIME: "5"
      MAX_WALL_TIME_LIMIT: "60"
      MAX_MAX_FILE_SIZE: "65536"
      # Resque workers per container. 3 containers x 2 = 6 total, matched to the
      # 2-vCPU box: enough to overlap compiles with I/O without the 6x CPU
      # oversubscription (12 workers) that caused isolate internal errors.
      COUNT: "2"

  judge0-worker-2:
