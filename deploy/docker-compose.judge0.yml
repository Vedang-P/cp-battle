# Judge0 VM stack — Judge0 server + worker + its own Postgres + Redis.
# Judge0 needs privileged mode for the isolate sandbox (cgroups).
#
# Usage (on the Judge0 VM, from the repo root):
#   docker compose --env-file .env.judge0 -f deploy/docker-compose.judge0.yml up -d

name: zapdos-judge0

services:
  judge0-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judge0-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  judge0-server:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    ports:
      - "2358:2358"
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/curl -sf http://localhost:2358/languages >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  judge0-worker:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    command: ["./scripts/workers"]
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"

  judge0-worker-2:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    command: ["./scripts/workers"]
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"

  judge0-worker-3:
    image: mrkushalsm/judge0:latest
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    command: ["./scripts/workers"]
    volumes:
      - ../judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:${JUDGE0_DB_PASSWORD}@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: "6379"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      ENABLE_CGROUP: "false"

volumes:
  judge0-db-data:
  judge0-redis-data:
