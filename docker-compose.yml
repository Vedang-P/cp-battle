# Local development infrastructure for CP Battle.
# Brings up Postgres, Redis, and optionally the Piston code-execution judge.
#
# Piston does NOT work on Docker Desktop for Windows due to isolate sandbox
# requirements. It works on Linux. For Windows dev, skip Piston and the
# health check will report it as unavailable (code submission returns an error).
#
# Usage:
#   docker compose up -d            # start all services
#   docker compose up -d postgres redis   # skip piston
#   docker compose down             # stop (keeps data volumes)

name: cp-battle

services:
  postgres:
    image: postgres:16-alpine
    container_name: cpb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpb
      POSTGRES_PASSWORD: cpb_local
      POSTGRES_DB: cpbattle
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpb -d cpbattle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cpb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

