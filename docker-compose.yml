# Local development infrastructure for CP Battle.
#
# Services:
#   - Postgres 16  (app database)
#   - Redis 7      (matchmaking queue + Socket.IO)
#   - Judge0 CE    (code execution engine — requires cgroups v1)
#
# IMPORTANT: Judge0 uses `isolate` for sandboxing, which needs cgroups v1.
# On Ubuntu 24.04, add this GRUB boot parameter:
#   systemd.unified_cgroup_hierarchy=0
# Then run: sudo update-grub && sudo reboot
#
# Usage:
#   docker compose up -d                          # start everything
#   docker compose up -d judge0-server judge0-worker  # judge only
#   docker compose down                           # stop (keeps data volumes)

name: cp-battle

services:
  # ── App infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cpb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpb
      POSTGRES_PASSWORD: cpb_local
      POSTGRES_DB: cpbattle
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpb -d cpbattle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cpb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "cpb_redis_pass"]
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cpb_redis_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Judge0 CE (code execution engine) ──────────────────────────────
  # Provides isolated sandboxed execution for C++, Python, Java.
  # API docs: http://localhost:2358/docs

  judge0-db:
    image: postgres:16-alpine
    container_name: cpb-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_local
      POSTGRES_DB: judge0
    volumes:
      - ./.docker-data/judge0-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7-alpine
    container_name: cpb-judge0-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.docker-data/judge0-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: cpb-judge0-server
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    ports:
      - "2358:2358"
    volumes:
      - ./judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:judge0_local@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: cpb-judge0-secret-key-base-change-in-prod
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/curl -sf http://localhost:2358/languages >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  judge0-worker:
    image: judge0/judge0:1.13.1
    container_name: cpb-judge0-worker
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    command: ["./scripts/workers"]
    volumes:
      - ./judge0-cable.yml:/api/config/cable.yml:ro
    environment:
      DATABASE_URL: postgresql://judge0:judge0_local@judge0-db:5432/judge0
      REDIS_URL: redis://judge0-redis:6379
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: cpb-judge0-secret-key-base-change-in-prod
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
